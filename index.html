<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>岡崎かつひろ 自己紹介カード</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --ink:#22201d; --sub:#6b6459; --line:#e7e1d6;
    --accent:#c5622d; --accent-soft:#f4ede3; --paper:#fffdf9;
  }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:#efe9df; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:40px 20px;
  }
  .card {
    width:1000px; max-width:100%; aspect-ratio:1000/600;
    background:var(--paper); border-radius:18px; overflow:hidden;
    box-shadow:0 24px 60px rgba(60,45,30,.22);
    display:grid; grid-template-columns:360px 1fr;
    border:1px solid var(--line);
  }
  /* 左：写真 */
  .photo {
    position:relative; background:#ded6c8; overflow:hidden;
  }
  .photo img {
    width:100%; height:100%; object-fit:cover; object-position:50% 22%;
    display:block;
  }
  .photo::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(105deg, transparent 78%, rgba(255,253,249,.9) 100%);
  }
  /* 右：情報 */
  .info {
    padding:52px 54px 46px; display:flex; flex-direction:column; position:relative;
  }
  .accentbar { width:52px; height:4px; background:var(--accent); border-radius:2px; margin-bottom:26px; }
  .name-jp { font-size:46px; font-weight:800; letter-spacing:.04em; line-height:1.05; }
  .name-en { font-size:15px; letter-spacing:.28em; color:var(--sub); margin-top:10px; text-transform:uppercase; }
  .titles { margin-top:30px; display:flex; flex-direction:column; gap:9px; }
  .titles li {
    list-style:none; font-size:16.5px; font-weight:600; color:var(--ink);
    padding-left:20px; position:relative;
  }
  .titles li::before {
    content:""; position:absolute; left:0; top:.62em;
    width:8px; height:8px; border-radius:50%; background:var(--accent);
  }
  .achieve {
    margin-top:22px; display:inline-block; align-self:flex-start;
    background:var(--accent-soft); color:#9a4a1f;
    font-size:13.5px; font-weight:700; padding:8px 15px; border-radius:999px;
    letter-spacing:.02em;
  }
  .contact {
    margin-top:auto; padding-top:26px; border-top:1px solid var(--line);
    display:flex; flex-direction:column; gap:7px;
  }
  .contact div { font-size:14.5px; color:var(--sub); letter-spacing:.02em; }
  .contact b { display:inline-block; width:52px; color:var(--accent); font-weight:700; }
  .contact span { color:var(--ink); }
</style>
</head>
